<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quinta do Paraíso | O Refúgio</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Manrope:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #ffffff; 
            --accent-color: #D4AF37; 
            --glass-bg: rgba(15, 15, 15, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        
        body, html { 
            width: 100%; height: 100vh; overflow: hidden; 
            font-family: 'Manrope', sans-serif; background-color: var(--bg-color); color: var(--text-color); 
        }
        
        h1, h2, h3 { font-family: 'Cinzel', serif; font-weight: 600; }

        /* PRELOADER E EFEITOS (Inalterados e perfeitos) */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background-color: #000000;
            z-index: 999999; display: flex; justify-content: center; align-items: center;
            transition: transform 1.2s cubic-bezier(0.77, 0, 0.175, 1), opacity 1s;
        }
        #preloader.hide { transform: translateY(-100%); opacity: 0; pointer-events: none; }
        
        #start-hint { position: absolute; text-align: center; z-index: 20; animation: fadeInOutHint 3s infinite; transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1); }
        #start-hint.hit { transform: scale(1.1) translateY(15px); opacity: 0 !important; filter: blur(8px); animation: none !important; }
        #start-hint h2 { color: rgba(212, 175, 55, 0.9); letter-spacing: 4px; font-size: 2rem; margin-bottom: 10px; }
        #start-hint p { color: rgba(255, 255, 255, 0.6); font-family: 'Manrope', sans-serif; letter-spacing: 2px; text-transform: uppercase; font-size: 0.9rem; }
        @keyframes fadeInOutHint { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        .wine-drop { position: absolute; top: -50px; width: 14px; height: 14px; background: var(--accent-color); border-radius: 0 50% 50% 50%; transform: rotate(45deg); opacity: 0; z-index: 10; left: 50%; margin-left: -7px; }
        .wine-drop.falling { animation: dropFall 0.8s cubic-bezier(0.55, 0.085, 0.68, 0.53) forwards; }
        @keyframes dropFall { 0% { top: -50px; opacity: 1; transform: scale(1) rotate(45deg); } 80% { transform: scale(1) rotate(45deg); } 100% { top: 50%; margin-top: -7px; opacity: 1; transform: scale(0.2) rotate(45deg); } }

        .wine-ripple { position: absolute; width: 30px; height: 30px; border: 2px solid var(--accent-color); border-radius: 50%; opacity: 0; z-index: 5; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(1); }
        .wine-ripple.splash { animation: rippleEffect 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        @keyframes rippleEffect { 0% { transform: translate(-50%, -50%) scale(1); opacity: 1; border-width: 4px; } 50% { opacity: 0.5; border-width: 2px; } 100% { transform: translate(-50%, -50%) scale(30); opacity: 0; border-width: 0px; } }

        .logo-wrapper { position: relative; width: 280px; height: 280px; overflow: hidden; opacity: 0; transition: opacity 0.5s; }
        .logo-wrapper.show { opacity: 1; }
        .logo-vazio { width: 100%; height: 100%; object-fit: contain; opacity: 0.2; filter: grayscale(100%); }
        .logo-cheio-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .logo-cheio { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.6)); }
        .liquid-mask { position: absolute; top: 10%; left: -50%; width: 200%; height: 200%; background-color: #000; border-radius: 40%; }
        .liquid-mask.animate { animation: waves 3s infinite linear, fillWine 3s ease forwards; }
        @keyframes waves { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fillWine { 0% { top: 10%; } 100% { top: -200%; } }

        .corner-logo { position: absolute; top: 30px; left: 40px; width: 90px; z-index: 50; transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); opacity: 0; filter: drop-shadow(0px 0px 15px rgba(255, 255, 255, 0.4)); }
        .corner-logo:hover { transform: scale(1.1) rotate(5deg); filter: drop-shadow(0px 0px 20px rgba(212, 175, 55, 0.6)); }
        .map-container.assemble .corner-logo { animation: fadeInLogo 1s ease forwards 1.5s; }
        @keyframes fadeInLogo { to { opacity: 1; } }

        /* CURSORES */
        .cursor-dot, .cursor-outline { position: fixed; top: 0; left: 0; transform: translate(-50%, -50%); border-radius: 50%; z-index: 9999; pointer-events: none; }
        .cursor-dot { width: 8px; height: 8px; background-color: var(--accent-color); }
        .cursor-outline { width: 40px; height: 40px; border: 1px solid var(--accent-color); transition: width 0.2s, height 0.2s, background-color 0.2s; }
        .cursor-outline.expand { width: 80px; height: 80px; background-color: rgba(212, 175, 55, 0.15); backdrop-filter: blur(2px); }

        /* MAPA INTERATIVO & SLICES */
        .map-container { width: 100%; height: 100vh; position: relative; overflow: hidden; background-color: var(--bg-color); }
        .map-bg-container { position: absolute; top: -5%; left: -5%; width: 110%; height: 110%; z-index: 0; transition: transform 0.1s ease-out; }
        .map-slice { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('fundo_douro.jpg') center/cover no-repeat; transition: transform 1.5s cubic-bezier(0.86, 0, 0.07, 1); }
        
        .slice-1 { clip-path: polygon(0 0, 25.5% 0, 25.5% 100%, 0% 100%); transform: translateY(-100%); }
        .slice-2 { clip-path: polygon(24.5% 0, 50.5% 0, 50.5% 100%, 24.5% 100%); transform: translateY(100%); }
        .slice-3 { clip-path: polygon(49.5% 0, 75.5% 0, 75.5% 100%, 49.5% 100%); transform: translateY(-100%); }
        .slice-4 { clip-path: polygon(74.5% 0, 100% 0, 100% 100%, 74.5% 100%); transform: translateY(100%); }

        .map-container.assemble .map-slice { transform: translateY(0); }
        .map-container.assemble .slice-1 { transition-delay: 0.1s; }
        .map-container.assemble .slice-2 { transition-delay: 0.3s; }
        .map-container.assemble .slice-3 { transition-delay: 0.2s; }
        .map-container.assemble .slice-4 { transition-delay: 0.4s; }

        .map-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)); pointer-events: none; z-index: 1;
            opacity: 0; transition: background 1.5s ease, opacity 2s ease 1s;
        }
        .map-container.assemble .map-overlay { opacity: 1; }

        /* TÍTULOS (Dinâmicos) */
        .hero-title { position: absolute; top: 40px; right: 60px; text-align: right; z-index: 10; opacity: 0; transform: translateY(20px); transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .hero-title h1 { font-size: 3.5rem; letter-spacing: 4px; text-shadow: 0 5px 15px rgba(0,0,0,0.8); transition: color 1s; }
        .hero-title p { font-size: 1.1rem; color: var(--accent-color); letter-spacing: 2px; text-transform: uppercase; margin-top: 5px; text-shadow: 0 2px 5px rgba(0,0,0,0.9); font-weight: 600; transition: color 1s; }
        .map-container.assemble .hero-title { opacity: 1; transform: translateY(0); transition-delay: 1.5s; }

        /* HOTSPOTS GERAIS */
        .hotspot {
            position: absolute; display: flex; flex-direction: column; align-items: center;
            opacity: 0; transform: scale(0) translateY(20px); transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 20;
            pointer-events: none; /* Desativado até ser visível */
        }
        .hotspot.visible { opacity: 1; transform: scale(1) translateY(0); pointer-events: all; }
        .hotspot.fade-out { opacity: 0 !important; transform: scale(0) translateY(-20px) !important; pointer-events: none !important; }

        .hotspot-dot { width: 20px; height: 20px; background-color: var(--accent-color); border-radius: 50%; box-shadow: 0 0 20px var(--accent-color); position: relative; }
        .hotspot-dot::before { content: ''; position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px; border: 1px solid var(--accent-color); border-radius: 50%; animation: pulse 2s infinite; }
        .hotspot-label { margin-top: 15px; font-family: 'Cinzel', serif; font-size: 1.2rem; background: rgba(0,0,0,0.8); padding: 8px 20px; border-radius: 30px; backdrop-filter: blur(5px); border: 1px solid rgba(212, 175, 55, 0.4); white-space: nowrap; transition: color 0.3s, border-color 0.3s, transform 0.3s; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .hotspot:hover .hotspot-label { color: var(--accent-color); border-color: var(--accent-color); transform: translateY(-5px); }
        @keyframes pulse { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }

        /* FASE 1: POSIÇÕES PAP (Abstratas no céu/montanhas) */
        #pap-1 { top: 30%; left: 30%; }
        #pap-2 { top: 40%; left: 60%; }
        #pap-3 { top: 25%; left: 80%; }

        /* FASE 2: POSIÇÕES COMERCIAIS (Ancoradas nos elementos reais da foto) */
        /* Nas casas da aldeia */
        #com-1 { top: 68%; left: 42%; }
        /* Nos socalcos da montanha à esquerda */
        #com-2 { top: 48%; left: 18%; }
        /* No rio */
        #com-3 { top: 60%; left: 68%; }
        /* Canto flutuante para reservas */
        #com-4 { top: 82%; left: 85%; }

        /* MODAL */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(15px);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease; z-index: 9990;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal-content { background: var(--glass-bg); border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 20px; padding: 50px; max-width: 800px; width: 90%; transform: translateY(50px); transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1); position: relative; box-shadow: 0 30px 60px rgba(0,0,0,0.9); }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        
        .close-btn { position: absolute; top: 25px; right: 30px; font-size: 1.5rem; color: var(--text-color); background: none; border: none; font-family: 'Manrope'; transition: color 0.3s; font-weight: 600; }
        .close-btn:hover { color: var(--accent-color); }
        .modal-body h2 { font-size: 3rem; color: var(--accent-color); margin-bottom: 20px; border-bottom: 1px solid rgba(212, 175, 55, 0.3); padding-bottom: 15px; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .modal-body p { font-size: 1.1rem; line-height: 1.8; color: #ddd; margin-bottom: 15px; }
        
        .grid-essencia { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .grid-item h3 { color: #fff; font-size: 1.2rem; margin-bottom: 5px; font-family: 'Manrope', sans-serif; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .grid-item p { font-size: 0.95rem; color: #bbb; }

        .narrative-form { font-size: 1.5rem; line-height: 2.2; color: #ccc; text-align: left; font-family: 'Cinzel', serif; margin-top: 20px; }
        .narrative-form input, .narrative-form select { font-family: 'Cinzel', serif; font-size: 1.5rem; color: var(--accent-color); background: transparent; border: none; border-bottom: 1px dashed #666; padding: 0 5px; cursor: pointer; text-align: center; transition: border-color 0.3s; }
        .narrative-form input:focus, .narrative-form select:focus { border-bottom: 1px solid var(--accent-color); outline: none; }
        
        .action-buttons { display: flex; gap: 20px; margin-top: 40px; }
        .btn-primary { padding: 15px 40px; background-color: var(--accent-color); color: #111; border: 1px solid var(--accent-color); border-radius: 50px; font-family: 'Manrope', sans-serif; font-size: 1rem; text-transform: uppercase; transition: all 0.4s; font-weight: 700; flex: 2; text-align: center; }
        .btn-primary:hover { background-color: transparent; color: var(--accent-color); }
        
        .btn-secondary { padding: 15px 30px; background-color: transparent; color: #aaa; border: 1px solid #444; border-radius: 50px; font-family: 'Manrope', sans-serif; font-size: 0.9rem; transition: all 0.4s; flex: 1; text-align: center; }
        .btn-secondary:hover { border-color: var(--text-color); color: var(--text-color); }
        
        .apresentacao-dica {
            position: absolute; bottom: 30px; width: 100%; text-align: center; color: rgba(255,255,255,0.4); font-size: 0.9rem; letter-spacing: 2px;
            opacity: 0; transition: opacity 1s; pointer-events: none; z-index: 10; text-shadow: 0 2px 4px rgba(0,0,0,1);
        }
        .apresentacao-dica.show { animation: fadeInOut 3s infinite; }
    </style>
</head>
<body>

    <!-- PRELOADER -->
    <div id="preloader">
        <div id="start-hint">
            <h2>Dê "Espaço" ao descanso</h2>
            <p>Prima a barra para deixar a experiência respirar</p>
        </div>
        <div class="wine-drop" id="drop"></div>
        <div class="wine-ripple" id="ripple"></div>
        
        <div class="logo-wrapper" id="logo-container">
            <img src="Logo.png" alt="Fundo" class="logo-vazio">
            <div class="logo-cheio-container">
                <img src="Logo.png" alt="Cheio" class="logo-cheio">
            </div>
            <div class="liquid-mask" id="liquid"></div>
        </div>
    </div>

    <div class="map-container" id="mapa-interativo">
        <div class="map-bg-container">
            <div class="map-slice slice-1"></div>
            <div class="map-slice slice-2"></div>
            <div class="map-slice slice-3"></div>
            <div class="map-slice slice-4"></div>
        </div>
        
        <div class="map-overlay" id="main-overlay"></div>
        <img src="Logo.png" alt="QP" class="corner-logo hover-target">
        
        <div class="hero-title" id="main-title">
            <h1>A TESE</h1>
            <p>Apresentação de Projeto</p>
        </div>

        <div class="apresentacao-dica" id="map-hint">CONTINUE A PREMIR A BARRA DE ESPAÇOS</div>

        <!-- FASE 1: HOTSPOTS DA PAP -->
        <div class="hotspot pap-spot hover-target" id="pap-1" onclick="openModal('pap_conceito')">
            <div class="hotspot-dot"></div><div class="hotspot-label">O Projeto</div>
        </div>
        <div class="hotspot pap-spot hover-target" id="pap-2" onclick="openModal('pap_experiencia')">
            <div class="hotspot-dot"></div><div class="hotspot-label">Tipologias de Turismo</div>
        </div>
        <div class="hotspot pap-spot hover-target" id="pap-3" onclick="openModal('pap_visao')">
            <div class="hotspot-dot"></div><div class="hotspot-label">Visão Estratégica</div>
        </div>

        <!-- FASE 2: HOTSPOTS DO SITE OFICIAL (Ocultos no início) -->
        <div class="hotspot com-spot hover-target" id="com-1" onclick="openModal('com_alojamento')">
            <div class="hotspot-dot"></div><div class="hotspot-label">Os Pombais (Alojamento)</div>
        </div>
        <div class="hotspot com-spot hover-target" id="com-2" onclick="openModal('com_vinhos')">
            <div class="hotspot-dot"></div><div class="hotspot-label">Os Nossos Vinhos</div>
        </div>
        <div class="hotspot com-spot hover-target" id="com-3" onclick="openModal('com_rio')">
            <div class="hotspot-dot"></div><div class="hotspot-label">Spa & Rio Douro</div>
        </div>
        <div class="hotspot com-spot hover-target" id="com-4" onclick="openModal('com_reservas')">
            <div class="hotspot-dot"></div><div class="hotspot-label">Portal de Hóspedes</div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="main-modal">
        <div class="modal-content">
            <button class="close-btn hover-target" onclick="closeModal()">FECHAR ✕</button>
            <div class="modal-body" id="modal-body-content"></div>
        </div>
    </div>

    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <script>
        // CURSORES E PARALLAX
        const cursorDot = document.querySelector('.cursor-dot');
        const cursorOutline = document.querySelector('.cursor-outline');
        const mapBgContainer = document.querySelector('.map-bg-container');
        
        window.addEventListener('mousemove', (e) => {
            cursorDot.style.left = `${e.clientX}px`; cursorDot.style.top = `${e.clientY}px`;
            cursorOutline.animate({ left: `${e.clientX}px`, top: `${e.clientY}px` }, { duration: 500, fill: "forwards" });
            
            const x = (window.innerWidth - e.pageX * 2) / 90;
            const y = (window.innerHeight - e.pageY * 2) / 90;
            mapBgContainer.style.transform = `translate(${x}px, ${y}px)`;
        });

        const updateHoverTargets = () => {
            document.querySelectorAll('.hover-target, button, input, select').forEach(target => {
                target.addEventListener('mouseenter', () => cursorOutline.classList.add('expand'));
                target.addEventListener('mouseleave', () => cursorOutline.classList.remove('expand'));
            });
        };
        updateHoverTargets();

        // MÁQUINA DE ESTADOS DA APRESENTAÇÃO
        let presentationPhase = 'preloader'; // 'preloader' -> 'pap' -> 'commercial'
        let currentSpot = 0;
        
        const papSpots = document.querySelectorAll('.pap-spot');
        const comSpots = document.querySelectorAll('.com-spot');

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();

                // FASE 0: PRELOADER
                if (presentationPhase === 'preloader') {
                    presentationPhase = 'animating_splash';
                    document.getElementById('start-hint').classList.add('hit');
                    
                    const drop = document.getElementById('drop');
                    const ripple = document.getElementById('ripple');
                    const logoContainer = document.getElementById('logo-container');
                    const liquid = document.getElementById('liquid');

                    drop.classList.add('falling');

                    setTimeout(() => {
                        drop.style.opacity = '0'; 
                        ripple.classList.add('splash'); 
                        logoContainer.classList.add('show'); 
                        liquid.classList.add('animate'); 
                    }, 800); 

                    setTimeout(() => {
                        document.getElementById('preloader').classList.add('hide');
                        document.getElementById('mapa-interativo').classList.add('assemble');

                        setTimeout(() => {
                            document.getElementById('map-hint').classList.add('show');
                            presentationPhase = 'pap'; // Muda para a fase PAP
                        }, 2000);
                    }, 4500);

                // FASE 1: APRESENTAÇÃO DA PAP
                } else if (presentationPhase === 'pap') {
                    document.getElementById('map-hint').style.display = 'none';
                    
                    if (currentSpot < papSpots.length) {
                        papSpots[currentSpot].classList.add('visible');
                        currentSpot++;
                    } else {
                        // Se já mostrou os 3 pontos, o próximo espaço aciona a transição para o site comercial!
                        transitionToCommercial();
                    }
                }
            }
        });

        function transitionToCommercial() {
            presentationPhase = 'commercial';
            
            // 1. Esconde os pontos da PAP
            papSpots.forEach(spot => spot.classList.add('fade-out'));
            
            // 2. Efeito Cinematográfico (Escurecer o ecrã)
            const overlay = document.getElementById('main-overlay');
            overlay.style.background = "linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.95))";
            
            // 3. Muda o Título Oficial
            const titleContainer = document.getElementById('main-title');
            titleContainer.style.opacity = '0';
            
            setTimeout(() => {
                titleContainer.innerHTML = `<h1>QUINTA DO PARAÍSO</h1><p>Experiências que amadurecem</p>`;
                titleContainer.style.opacity = '1';
                
                // Clareia a imagem novamente
                overlay.style.background = "linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7))";
                
                // Revela os novos botões posicionados nas casas, socalcos e rio!
                comSpots.forEach(spot => spot.classList.add('visible'));
            }, 1000);
        }

        // CONTEÚDO DOS MODAIS
        const modalData = {
            // DADOS FASE 1 (Apresentação teórica da tese)
            pap_conceito: `<h2>O Conceito</h2><p>O projeto centra-se na requalificação de antigos pombais existentes na propriedade, transformando-os em unidades de alojamento rural de elevada qualidade, com profundo respeito pela arquitetura e materiais da região.</p>`,
            pap_experiencia: `<h2>Tipologias de Turismo</h2><p>O empreendimento integra múltiplas tipologias num só ecossistema:</p><div class="grid-essencia"><div class="grid-item"><h3>Enoturismo</h3><p>Ligação direta à vinha[cite: 1].</p></div><div class="grid-item"><h3>Bem-Estar</h3><p>O exclusivo spa de vinoterapia[cite: 1].</p></div><div class="grid-item"><h3>Rio & Arqueologia</h3><p>Passeios fluviais e ligação ao Côa[cite: 1].</p></div></div>`,
            pap_visao: `<h2>Visão Estratégica</h2><p>Diferenciar a Quinta do Paraíso face à concorrência duriense, posicionando o visitante como participante ativo nas experiências (vindimas, passeios) e promovendo uma forte aposta na sustentabilidade.</p>`,

            // DADOS FASE 2 (Site Comercial Oficial para o Cliente Final)
            com_alojamento: `
                <h2>Os Nossos Pombais</h2>
                <p>Na tranquilidade da encosta duriense, transformámos o património esquecido num refúgio de luxo. Dispomos de 5 a 6 unidades exclusivas de alojamento onde a pedra, o xisto e a madeira criam uma atmosfera de conforto absoluto[cite: 1].</p>
                <p>Acorde com a neblina sobre o rio e termine o dia na sua piscina privativa, em total privacidade.</p>
            `,
            com_vinhos: `
                <h2>Néctar das Encostas</h2>
                <p>A cultura vitivinícola é a alma do nosso projeto. Caminhe connosco pelos socalcos milenares e conheça as nossas castas autóctones[cite: 1].</p>
                <p>A experiência culmina na adega, onde as nossas provas de vinhos orientadas são harmonizadas de forma sublime com enchidos, compotas e queijos dos pequenos produtores de Vila Nova de Foz Côa[cite: 1].</p>
            `,
            com_rio: `
                <h2>Água & Bem-Estar</h2>
                <p>Desça até às margens do rio Douro e embarque num cruzeiro fluvial privativo, explorando os imponentes vales a partir do leito[cite: 1].</p>
                <p>No regresso à quinta, o nosso Spa aguarda por si. Experimente a verdadeira Vinoterapia: banhos de imersão antioxidantes e esfoliações de grainha de uva que purificam o corpo e serenam a mente[cite: 1].</p>
            `,
            com_reservas: `
                <h2>O Seu Refúgio</h2>
                <form class="narrative-form hover-target">
                    "Eu sou o(a) <input type="text" placeholder="o seu nome" style="width: 200px;" required>, e desejo refugiar-me nos Pombais a partir de <input type="date" required>. 
                    Seremos <select><option>2 Adultos</option><option>1 Adulto</option></select>
