<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quinta do Paraíso | O Refúgio</title>
    <!-- Fontes Dribbble Style (Tipografia forte e elegante) -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Manrope:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #f4f0ea;
            --accent-color: #C5A059; /* Dourado */
            --douro-green: #3e4f2b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        
        body {
            font-family: 'Manrope', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        h1, h2, h3 { font-family: 'Cinzel', serif; font-weight: 400; }

        /* CURSOR CRIATIVO AWWWARDS STYLE */
        .cursor-dot, .cursor-outline {
            position: fixed; top: 0; left: 0; transform: translate(-50%, -50%);
            border-radius: 50%; z-index: 9999; pointer-events: none;
        }
        .cursor-dot { width: 8px; height: 8px; background-color: var(--accent-color); }
        .cursor-outline { 
            width: 40px; height: 40px; border: 1px solid var(--accent-color);
            transition: width 0.2s, height 0.2s, background-color 0.2s;
        }
        .cursor-outline.expand {
            width: 80px; height: 80px; background-color: rgba(197, 160, 89, 0.1);
            backdrop-filter: blur(2px);
        }

        /* HERO COM MÁSCARA DE TEXTO GIGANTE */
        .hero {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; position: relative;
        }
        
        .hero-video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0.4; z-index: -1;
        }

        .title-mask {
            font-size: 10vw; line-height: 1; text-align: center;
            background: url('https://images.unsplash.com/photo-1506377247377-2a5b3b417ebb?q=80&w=2000') center/cover;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: revealUp 2s cubic-bezier(0.77, 0, 0.175, 1) forwards;
        }

        .hero p { font-size: 1.2rem; letter-spacing: 4px; text-transform: uppercase; margin-top: 20px; color: var(--accent-color); }

        /* SECÇÃO DO JÚRI (INTERATIVA) */
        .jury-section {
            min-height: 100vh; padding: 15vh 10vw; display: flex;
            flex-direction: column; align-items: center; text-align: center;
            background-color: #0f0f0f;
        }

        .jury-section h2 { font-size: 4rem; margin-bottom: 20px; }
        .jury-section p.subtitle { color: #888; font-size: 1.2rem; margin-bottom: 50px; max-width: 600px; }

        .magnetic-wrap { display: flex; gap: 20px; margin-bottom: 60px; }
        
        /* BOTÕES MAGNÉTICOS */
        .magnetic-btn {
            padding: 20px 40px; border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px; background: transparent; color: var(--text-color);
            font-family: 'Manrope', sans-serif; font-size: 1rem; letter-spacing: 1px;
            transition: transform 0.3s ease, background-color 0.3s, border-color 0.3s;
            position: relative; overflow: hidden;
        }
        
        .magnetic-btn:hover { border-color: var(--accent-color); color: var(--accent-color); }

        /* RESULTADO DA INTERAÇÃO */
        .interactive-display {
            width: 100%; max-width: 900px; height: 500px; border-radius: 20px;
            overflow: hidden; position: relative; transition: all 0.8s ease;
        }
        
        .interactive-img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 1.5s cubic-bezier(0.19, 1, 0.22, 1), filter 1s;
            filter: grayscale(80%);
        }
        
        .interactive-display:hover .interactive-img { transform: scale(1.05); filter: grayscale(0%); }

        .interactive-text {
            position: absolute; bottom: 40px; left: 40px; right: 40px;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            padding: 30px; border-radius: 15px; border-left: 4px solid var(--accent-color);
            transform: translateY(100px); opacity: 0; transition: all 0.6s ease;
            text-align: left;
        }

        .interactive-display.show .interactive-text { transform: translateY(0); opacity: 1; }

        @keyframes revealUp {
            0% { transform: translateY(100px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- Cursores duplos animados -->
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <header class="hero">
        <img src="https://images.unsplash.com/photo-1596484552834-6a58f850e0a1?q=80&w=2000" class="hero-video" alt="Fundo">
        <h1 class="title-mask">QUINTA DO<br>PARAÍSO</h1>
        <p>Experiências que amadurecem</p>
    </header>

    <!-- O MOMENTO WOW PARA A APRESENTAÇÃO -->
    <section class="jury-section">
        <h2>A Sua Jornada</h2>
        <p class="subtitle">Um espaço desenhado à sua imagem. Selecione abaixo a essência que mais o inspira neste momento.</p>
        
        <div class="magnetic-wrap">
            <button class="magnetic-btn hover-target" data-type="paz">Tranquilidade</button>
            <button class="magnetic-btn hover-target" data-type="sabor">Gastronomia</button>
            <button class="magnetic-btn hover-target" data-type="descoberta">Descoberta</button>
        </div>

        <div class="interactive-display" id="display-board">
            <img src="https://images.unsplash.com/photo-1544070014-49c8f2ba1613?q=80&w=1000" id="dinamic-img" class="interactive-img" alt="Dinâmico">
            <div class="interactive-text" id="dinamic-text">
                <h3 style="font-size: 2rem; margin-bottom: 10px; color: var(--accent-color);">O Douro Espera Por Si</h3>
                <p style="font-size: 1.1rem; line-height: 1.6;">Selecione uma das opções acima para desenhar a sua experiência perfeita.</p>
            </div>
        </div>
    </section>

    <script>
        // 1. LÓGICA DO CURSOR AWWWARDS
        const cursorDot = document.querySelector('.cursor-dot');
        const cursorOutline = document.querySelector('.cursor-outline');
        const hoverTargets = document.querySelectorAll('.hover-target, button');

        window.addEventListener('mousemove', (e) => {
            const posX = e.clientX; const posY = e.clientY;
            cursorDot.style.left = `${posX}px`; cursorDot.style.top = `${posY}px`;
            
            // Efeito suave de atraso no outline
            cursorOutline.animate({ left: `${posX}px`, top: `${posY}px` }, { duration: 500, fill: "forwards" });
        });

        hoverTargets.forEach(target => {
            target.addEventListener('mouseenter', () => cursorOutline.classList.add('expand'));
            target.addEventListener('mouseleave', () => cursorOutline.classList.remove('expand'));
        });

        // 2. BOTÕES MAGNÉTICOS (Física avançada UI)
        const magneticBtns = document.querySelectorAll('.magnetic-btn');
        magneticBtns.forEach(btn => {
            btn.addEventListener('mousemove', (e) => {
                const rect = btn.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                btn.style.transform = `translate(${x * 0.3}px, ${y * 0.3}px)`;
            });
            btn.addEventListener('mouseleave', () => {
                btn.style.transform = `translate(0px, 0px)`;
            });
        });

        // 3. INTERAÇÃO EM TEMPO REAL PARA O JÚRI
        const data = {
            paz: {
                img: "https://images.unsplash.com/photo-1549416878-b9ca95e1e127?q=80&w=1000",
                title: "Spa de Vinoterapia",
                text: "Para o júri que procura repouso: um santuário de bem-estar onde as propriedades antioxidantes da uva duriense revitalizam corpo e mente."
            },
            sabor: {
                img: "https://images.unsplash.com/photo-1506377247377-2a5b3b417ebb?q=80&w=1000",
                title: "Enoturismo de Excelência",
                text: "Uma prova exclusiva pelas nossas castas autóctones. Descubra a textura e a alma dos nossos vinhos harmonizados com produtos regionais."
            },
            descoberta: {
                img: "https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?q=80&w=1000",
                title: "O Rio e a História",
                text: "Aventure-se num passeio náutico pelo coração dos socalcos do Alto Douro Vinhateiro ou explore os vestígios milenares do Vale do Côa."
            }
        };

        const displayBoard = document.getElementById('display-board');
        const imgEl = document.getElementById('dinamic-img');
        const textEl = document.getElementById('dinamic-text');

        magneticBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const type = btn.getAttribute('data-type');
                
                // Animação de saída
                displayBoard.classList.remove('show');
                imgEl.style.filter = "blur(10px) grayscale(100%)";
                
                setTimeout(() => {
                    // Atualiza conteúdo
                    imgEl.src = data[type].img;
                    textEl.innerHTML = `<h3 style="font-size: 2rem; margin-bottom: 10px; color: var(--accent-color);">${data[type].title}</h3><p style="font-size: 1.1rem; line-height: 1.6;">${data[type].text}</p>`;
                    
                    // Animação de entrada
                    imgEl.style.filter = "grayscale(80%)";
                    displayBoard.classList.add('show');
                }, 400);
            });
        });

        // Mostra o texto base inicialmente
        setTimeout(() => displayBoard.classList.add('show'), 1000);
    </script>
</body>
</html>
