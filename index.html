<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quinta do Paraíso | O Refúgio</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Manrope:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #f4f0ea;
            --accent-color: #C5A059;
            --glass-bg: rgba(20, 20, 20, 0.65);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        
        body, html { 
            width: 100%; height: 100vh; overflow: hidden; 
            font-family: 'Manrope', sans-serif; background-color: var(--bg-color); color: var(--text-color); 
        }
        
        h1, h2, h3 { font-family: 'Cinzel', serif; font-weight: 400; }

        /* PRELOADER: TELA PRETA & EFEITO GOTA DE VINHO */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background-color: #000000; /* Tela totalmente preta */
            z-index: 999999; display: flex; justify-content: center; align-items: center;
            transition: transform 1.2s cubic-bezier(0.77, 0, 0.175, 1), opacity 1s;
        }
        #preloader.hide { transform: translateY(-100%); opacity: 0; pointer-events: none; }
        
        #start-hint {
            position: absolute; color: rgba(197, 160, 89, 0.6); letter-spacing: 6px; 
            font-family: 'Cinzel', serif; font-size: 1.2rem; transition: opacity 0.5s;
            animation: fadeInOutHint 2s infinite;
        }
        @keyframes fadeInOutHint { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* A Gota */
        .wine-drop {
            position: absolute; top: -50px; width: 12px; height: 12px;
            background: var(--accent-color); border-radius: 0 50% 50% 50%;
            transform: rotate(45deg); opacity: 0; z-index: 10;
        }
        .wine-drop.falling { animation: dropFall 1s cubic-bezier(0.55, 0.085, 0.68, 0.53) forwards; }
        @keyframes dropFall { 
            0% { top: -50px; opacity: 1; transform: scale(1) rotate(45deg); } 
            90% { transform: scale(1) rotate(45deg); }
            100% { top: 50%; opacity: 1; transform: scale(0.2) rotate(45deg); } 
        }

        /* A Ondulação do impacto */
        .wine-ripple {
            position: absolute; width: 30px; height: 30px; border: 2px solid var(--accent-color);
            border-radius: 50%; opacity: 0; z-index: 5;
        }
        .wine-ripple.splash { animation: rippleEffect 1.5s ease-out forwards; }
        @keyframes rippleEffect { 
            0% { transform: scale(1); opacity: 0.8; } 
            100% { transform: scale(20); opacity: 0; } 
        }

        /* O Logo Líquido */
        .logo-wrapper { position: relative; width: 280px; height: 280px; overflow: hidden; opacity: 0; transition: opacity 0.5s; }
        .logo-wrapper.show { opacity: 1; }
        
        .logo-vazio { width: 100%; height: 100%; object-fit: contain; opacity: 0.1; filter: grayscale(100%); }
        .logo-cheio-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .logo-cheio { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 0 20px rgba(197, 160, 89, 0.6)); }
        
        .liquid-mask {
            position: absolute; top: 10%; left: -50%; width: 200%; height: 200%;
            background-color: #000; border-radius: 40%;
        }
        .liquid-mask.animate { animation: waves 3s infinite linear, fillWine 3s ease forwards; }

        @keyframes waves { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fillWine { 0% { top: 10%; } 100% { top: -200%; } }

        /* LOGO FIXO NO CANTO */
        .corner-logo { position: absolute; top: 30px; left: 40px; width: 90px; z-index: 50; transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .corner-logo:hover { transform: scale(1.1) rotate(5deg); }

        /* CURSORES */
        .cursor-dot, .cursor-outline { position: fixed; top: 0; left: 0; transform: translate(-50%, -50%); border-radius: 50%; z-index: 9999; pointer-events: none; }
        .cursor-dot { width: 8px; height: 8px; background-color: var(--accent-color); }
        .cursor-outline { width: 40px; height: 40px; border: 1px solid var(--accent-color); transition: width 0.2s, height 0.2s, background-color 0.2s; }
        .cursor-outline.expand { width: 80px; height: 80px; background-color: rgba(197, 160, 89, 0.1); backdrop-filter: blur(2px); }

        /* MAPA INTERATIVO (Agora a usar o ficheiro fundo_douro.jpg) */
        .map-container {
            width: 100%; height: 100vh; position: relative;
            background: url('fundo_douro.jpg') center/cover no-repeat;
        }
        
        .map-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.7)); pointer-events: none;
        }

        .hero-title { position: absolute; top: 40px; right: 60px; text-align: right; z-index: 10; }
        .hero-title h1 { font-size: 3rem; letter-spacing: 4px; }
        .hero-title p { font-size: 1rem; color: var(--accent-color); letter-spacing: 2px; text-transform: uppercase; margin-top: 5px; }

        /* PONTOS INTERATIVOS (HOTSPOTS) */
        .hotspot {
            position: absolute; display: flex; flex-direction: column; align-items: center;
            opacity: 0; transform: scale(0) translateY(20px); transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 20;
        }
        .hotspot.visible { opacity: 1; transform: scale(1) translateY(0); }
        .hotspot-dot { width: 20px; height: 20px; background-color: var(--accent-color); border-radius: 50%; box-shadow: 0 0 20px var(--accent-color); position: relative; }
        .hotspot-dot::before { content: ''; position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px; border: 1px solid var(--accent-color); border-radius: 50%; animation: pulse 2s infinite; }
        .hotspot-label { margin-top: 15px; font-family: 'Cinzel', serif; font-size: 1.2rem; background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; backdrop-filter: blur(5px); border: 1px solid rgba(197, 160, 89, 0.3); white-space: nowrap; transition: color 0.3s, border-color 0.3s; }
        .hotspot:hover .hotspot-label { color: var(--accent-color); border-color: var(--accent-color); }

        @keyframes pulse { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }

        #spot-1 { top: 35%; left: 25%; }
        #spot-2 { top: 60%; left: 45%; }
        #spot-3 { top: 40%; left: 70%; }
        #spot-4 { top: 75%; left: 80%; }

        /* MODAL DE CONTEÚDO */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(15px);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease; z-index: 9990;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal-content { background: var(--glass-bg); border: 1px solid rgba(197, 160, 89, 0.2); border-radius: 20px; padding: 50px; max-width: 800px; width: 90%; transform: translateY(50px); transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1); position: relative; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        
        .close-btn { position: absolute; top: 25px; right: 30px; font-size: 1.5rem; color: var(--text-color); background: none; border: none; font-family: 'Manrope'; transition: color 0.3s; }
        .close-btn:hover { color: var(--accent-color); }
        .modal-body h2 { font-size: 3rem; color: var(--accent-color); margin-bottom: 20px; border-bottom: 1px solid rgba(197, 160, 89, 0.3); padding-bottom: 15px; }
        .modal-body p { font-size: 1.1rem; line-height: 1.8; color: #ccc; margin-bottom: 15px; }
        
        .grid-essencia { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .grid-item h3 { color: white; font-size: 1.2rem; margin-bottom: 5px; font-family: 'Manrope', sans-serif; }
        .grid-item p { font-size: 0.9rem; color: #aaa; }

        .narrative-form { font-size: 1.5rem; line-height: 2.2; color: #bbb; text-align: left; font-family: 'Cinzel', serif; margin-top: 20px; }
        .narrative-form input, .narrative-form select { font-family: 'Cinzel', serif; font-size: 1.5rem; color: var(--accent-color); background: transparent; border: none; border-bottom: 1px dashed #555; padding: 0 5px; cursor: pointer; text-align: center; transition: border-color 0.3s; }
        .narrative-form input:focus, .narrative-form select:focus { border-bottom: 1px solid var(--accent-color); outline: none; }
        .submit-btn { display: block; margin: 40px 0 0; padding: 15px 40px; background-color: transparent; color: var(--accent-color); border: 1px solid var(--accent-color); border-radius: 50px; font-family: 'Manrope', sans-serif; font-size: 1rem; text-transform: uppercase; transition: all 0.4s; }
        .submit-btn:hover { background-color: var(--accent-color); color: #111; }
        
        .apresentacao-dica {
            position: absolute; bottom: 30px; width: 100%; text-align: center; color: rgba(255,255,255,0.3); font-size: 0.9rem; letter-spacing: 2px;
            opacity: 0; transition: opacity 1s; pointer-events: none; z-index: 10;
        }
        .apresentacao-dica.show { animation: fadeInOut 3s infinite; }
        @keyframes fadeInOut { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; } }
    </style>
</head>
<body>

    <!-- PRELOADER COM ANIMAÇÃO GOTA & COPO -->
    <div id="preloader">
        <div id="start-hint">PRIMA A BARRA DE ESPAÇOS</div>
        <div class="wine-drop" id="drop"></div>
        <div class="wine-ripple" id="ripple"></div>
        
        <div class="logo-wrapper" id="logo-container">
            <img src="Logo.png" alt="Fundo" class="logo-vazio">
            <div class="logo-cheio-container">
                <img src="Logo.png" alt="Cheio" class="logo-cheio">
            </div>
            <div class="liquid-mask" id="liquid"></div>
        </div>
    </div>

    <!-- MAPA PRINCIPAL -->
    <div class="map-container">
        <div class="map-overlay"></div>
        <img src="Logo.png" alt="QP" class="corner-logo hover-target">
        
        <div class="hero-title">
            <h1>QUINTA DO PARAÍSO</h1>
            <p>Experiências que amadurecem</p>
        </div>

        <div class="apresentacao-dica" id="map-hint">PRIMA A BARRA DE ESPAÇOS PARA REVELAR O PROJETO</div>

        <div class="hotspot hover-target" id="spot-1" onclick="openModal('legado')">
            <div class="hotspot-dot"></div><div class="hotspot-label">O Conceito</div>
        </div>
        <div class="hotspot hover-target" id="spot-2" onclick="openModal('essencia')">
            <div class="hotspot-dot"></div><div class="hotspot-label">A Experiência</div>
        </div>
        <div class="hotspot hover-target" id="spot-3" onclick="openModal('sustentabilidade')">
            <div class="hotspot-dot"></div><div class="hotspot-label">Visão & Sustentabilidade</div>
        </div>
        <div class="hotspot hover-target" id="spot-4" onclick="openModal('reservas')">
            <div class="hotspot-dot"></div><div class="hotspot-label">O Seu Refúgio</div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="main-modal">
        <div class="modal-content">
            <button class="close-btn hover-target" onclick="closeModal()">FECHAR ✕</button>
            <div class="modal-body" id="modal-body-content"></div>
        </div>
    </div>

    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <script>
        // CURSORES MAGNÉTICOS
        const cursorDot = document.querySelector('.cursor-dot');
        const cursorOutline = document.querySelector('.cursor-outline');
        
        window.addEventListener('mousemove', (e) => {
            cursorDot.style.left = `${e.clientX}px`; cursorDot.style.top = `${e.clientY}px`;
            cursorOutline.animate({ left: `${e.clientX}px`, top: `${e.clientY}px` }, { duration: 500, fill: "forwards" });
        });

        const updateHoverTargets = () => {
            document.querySelectorAll('.hover-target, button, input, select').forEach(target => {
                target.addEventListener('mouseenter', () => cursorOutline.classList.add('expand'));
                target.addEventListener('mouseleave', () => cursorOutline.classList.remove('expand'));
            });
        };
        updateHoverTargets();

        // MÁQUINA DE ESTADOS DA APRESENTAÇÃO
        let isSplashDone = false;
        let isAnimatingSplash = false;
        let currentSpot = 0;
        
        const hotspots = [
            document.getElementById('spot-1'),
            document.getElementById('spot-2'),
            document.getElementById('spot-3'),
            document.getElementById('spot-4')
        ];

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();

                // Fase 1: Animação da gota no ecrã preto
                if (!isSplashDone && !isAnimatingSplash) {
                    isAnimatingSplash = true;
                    document.getElementById('start-hint').style.opacity = '0';
                    
                    const drop = document.getElementById('drop');
                    const ripple = document.getElementById('ripple');
                    const logoContainer = document.getElementById('logo-container');
                    const liquid = document.getElementById('liquid');

                    // Gota cai
                    drop.classList.add('falling');

                    setTimeout(() => {
                        drop.style.opacity = '0'; // Gota desaparece
                        ripple.classList.add('splash'); // Ondulação
                        logoContainer.classList.add('show'); // Logo aparece
                        liquid.classList.add('animate'); // Logo enche
                    }, 1000); // 1s é o tempo da gota cair

                    // Fim do preloader e entrada no mapa
                    setTimeout(() => {
                        document.getElementById('preloader').classList.add('hide');
                        isSplashDone = true;
                        document.getElementById('map-hint').classList.add('show');
                    }, 4500);

                // Fase 2: Revelação dos botões no mapa
                } else if (isSplashDone) {
                    document.getElementById('map-hint').style.display = 'none';
                    if (currentSpot < hotspots.length) {
                        hotspots[currentSpot].classList.add('visible');
                        currentSpot++;
                    }
                }
            }
        });

        // CONTEÚDO DOS MODAIS (PAP)
        const modalData = {
            legado: `
                <h2>O Nosso Legado</h2>
                <p>A Quinta do Paraíso nasce no coração do Alto Douro Vinhateiro, em Vila Nova de Foz Côa. Transformámos os antigos pombais da propriedade em exclusivas unidades de alojamento rural.</p>
                <p>Com um profundo respeito pela arquitetura tradicional duriense, preservámos a pedra, o xisto e a madeira, fundindo este património devoluto com a majestosa paisagem em socalcos que nos envolve.</p>
            `,
            essencia: `
                <h2>A Essência Duriense</h2>
                <p>A nossa oferta não se limita a fornecer um quarto. É uma curadoria de emoções, desenhada para criar uma ligação intrínseca entre o visitante e as raízes da nossa quinta.</p>
                <div class="grid-essencia">
                    <div class="grid-item"><h3>Enoturismo</h3><p>Visitas guiadas e degustações orientadas acompanhadas por produtos regionais.</p></div>
                    <div class="grid-item"><h3>Vinoterapia</h3><p>Spa vínico com esfoliações de grainhas e banhos de imersão antioxidantes.</p></div>
                    <div class="grid-item"><h3>O Rio</h3><p>Passeios em jipe pelas vinhas e cruzeiros privativos nas águas do Douro.</p></div>
                    <div class="grid-item"><h3>A História</h3><p>Proximidade e apoio na visita ao Parque Arqueológico do Vale do Côa.</p></div>
                </div>
            `,
            sustentabilidade: `
                <h2>Visão e Sustentabilidade</h2>
                <p>O privilégio de habitar um território classificado como Património Mundial da UNESCO traz consigo a responsabilidade inegável de o proteger. O nosso modelo assenta no turismo responsável.</p>
                <p><strong>Arquitetura Viva:</strong> Recuperação de estruturas devolutas evitando a construção de raiz.<br>
                <strong>Mobilidade Verde:</strong> Postos de carregamento para viaturas elétricas inseridos na quinta.<br>
                <strong>Economia Circular:</strong> Integração de produtos endógenos e locais nos nossos serviços e piqueniques.</p>
            `,
            reservas: `
                <h2>Escreva a sua História</h2>
                <form class="narrative-form hover-target">
                    "Eu sou o(a) <input type="text" placeholder="o seu nome" style="width: 200px;" required>, e desejo refugiar-me na Quinta a partir do dia <input type="date" required>. 
                    Seremos <select><option>2 Adultos</option><option>1 Adulto</option></select> 
                    à procura de focar o nosso tempo em <select><option>Enoturismo & Provas</option><option>Spa & Bem-Estar</option></select>. 
                    Aguardo contacto."
                    <button type="button" class="submit-btn hover-target" onclick="alert('Pedido registado! A plataforma será atualizada na fase final do projeto.')">Garantir Lugar</button>
                </form>
            `
        };

        const modalOverlay = document.getElementById('main-modal');
        const modalBody = document.getElementById('modal-body-content');

        window.openModal = function(type) {
            modalBody.innerHTML = modalData[type];
            modalOverlay.classList.add('active');
            updateHoverTargets();
        }

        window.closeModal = function() {
            modalOverlay.classList.remove('active');
        }

        modalOverlay.addEventListener('click', (e) => {
            if(e.target === modalOverlay) closeModal();
        });
    </script>
</body>
</html>
